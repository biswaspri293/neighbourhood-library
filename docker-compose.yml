version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: library_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: library_backend
    restart: always
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: library_frontend
    restart: always
    depends_on:
      - backend
    env_file:
      - .env
    ports:
      - "3000:3000"

volumes:
  postgres_data: